<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body>
      <div class="col-lg-10 mx-auto p-3 py-md-5">
        <header class="d-flex align-items-center pb-3 mb-5 border-bottom">
          <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16">
              <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
            <span class="fs-4 ms-1">WhatsApp Bot</span>
          </a>
        </header>
        <main>
          <div class="row g-5">
            <div class="col-md-8">
              <h2 class="pb-2">Connected Devices</h2>
              <table class="table">
                <thead>
                  <tr>
                    <th scope="col">JID</th>
                    <th scope="col">Push Name</th>
                    <th scope="col">Business Name</th>
                    <th scope="col">IsConnected</th>
                  </tr>
                </thead>
                <tbody>
                  {{ range $client := .Clients }}
                    <tr>
                      <td>{{ $client.Store.ID }}</td>
                      <td>{{ $client.Store.PushName}}</td>
                      <td>{{ $client.Store.BusinessName}}</td>
                      <td>
                        {{ if $client.IsConnected }}
                          <span class="badge bg-success">Online</span>
                        {{ else }}
                          <span class="badge bg-danger">Offline</span>
                        {{ end }}
                      </td>
                    </tr>
                  {{ end }}
                </tbody>
              </table>
            </div>
            <div class="col-md-4">
              <div class="row">
                <button type="button" class="btn btn-primary float-end" id="connect-device">Connect Device</button>
              </div>
              <div class="row">
                <canvas id="qrcode"></canvas>
              </div>
            </div>
          </div>
        </main>
        <footer class="footer mt-auto py-3 bg-light fixed-bottom">
          <div class="container text-center">
            <span class="text-muted">Created by <a href="https://github.com/macedo">Rafael Macedo</a> © 2023</span>
          </div>
        </footer>
      </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
      let ws;

      document
        .getElementById("connect-device")
        .addEventListener("click", (evt) => {
          let btn = evt.target;
          let canvas = document.getElementById("qrcode");

          btn.disabled = true;

          ws = new WebSocket("ws://localhost:8080/ws");

          ws.onopen = () => {
            console.log("connection open");
          };

          ws.onclose = () =>  {
            console.log("connection closed");
            btn.disabled = false;
          };

          ws.onerror = (error) => {
            console.log("connection error ", error);
            btn.disabled = false;
          };

          ws.onmessage = (message) => {
            console.log("connection received ", message);

            let data = JSON.parse(message.data);

            switch(data.type) {
              case "qrcode":
                new QRious({
                  element: canvas,
                  size: 300,
                  value: data.code
                })
                break;

              case "timeout":
                btn.disabled = false;
                canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
                break;
            }
          };
        });
    </script>
  </body>
</html>
